apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: topo-clusters-manager
spec:
  title: 'Topo Clusters Manager'
  url: 'https://github.com/felixqiu014-wq/topo-clusters-manager'
  gitRepo: 'https://github.com/felixqiu014-wq/topo-clusters-manager'
  author: 'felixqiu014-wq'
  description: 'A lightweight cluster topology management UI for visualizing regions, zones, and node assignments.'
  readme: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/topo-clusters-manager/README.md'
  icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/topo-clusters-manager/logo.png'
  templateType: inline
  locale: en
  i18n:
    zh:
      description: '一个轻量的集群物理拓扑管理界面，用于可视化区域、可用区和节点分配。'
      readme: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/topo-clusters-manager/README_zh.md'
  categories:
    - frontend
    - dev-ops
  defaults:
    app_name:
      type: string
      value: topo-clusters-manager-${{ random(8) }}
    app_host:
      type: string
      value: topo-clusters-manager-${{ random(8) }}
  inputs:
    GEMINI_API_KEY:
      description: 'Gemini API key used by the frontend application.'
      type: string
      default: ''
      required: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/felixqiu014-wq/topo-clusters-manager:20260331-220400
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
        cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/felixqiu014-wq/topo-clusters-manager:20260331-220400
          imagePullPolicy: IfNotPresent
          env:
            - name: GEMINI_API_KEY
              value: ${{ inputs.GEMINI_API_KEY }}
            - name: APP_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8080
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/topo-clusters-manager/logo.png'
  name: 'Topo Clusters Manager'
  type: link
